<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Europe Bike Trip Route</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>Select Stops</h2>
            <div class="selection-actions">
                <button id="select-all" class="action-btn">Select All</button>
                <button id="deselect-all" class="action-btn">Deselect All</button>
            </div>
            
            <div class="add-city-container">
                <input type="text" id="new-city-input" placeholder="Add new city...">
                <button id="add-city-btn" class="action-btn">+</button>
                <button id="add-sleep-btn" class="action-btn" title="Add Sleep Mark">💤</button>
            </div>

            <div id="city-selector" class="city-selector">
                <!-- City items with drag/remove controls will be injected here -->
            </div>
        </aside>

        <div id="resizer" class="resizer"></div>

        <main class="content-area">
            <header>
                <h1>EuroVelo Adventure</h1>
                <p>Tracking the journey across Europe</p>
            </header>

            <div id="overview-map" class="overview-map">
                <!-- Overview map injected here -->
            </div>

            <div id="stats-bar" class="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">Cycling Distance</span>
                    <span id="total-distance" class="stat-value">0 km</span>
                    <div id="distance-breakdown" class="stat-breakdown">
                        <!-- Breakdown hidden -->
                    </div>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Total Days</span>
                    <span id="total-days" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Elevation Gain</span>
                    <span id="total-elevation" class="stat-value">0 m</span>
                </div>
            </div>

            <div id="route-container" class="route-container">
                <!-- Route segments will be injected here by script.js -->
            </div>
        </main>
    </div>

    <footer>
        <p>&copy; 2026 Bike Trip Journal</p>
    </footer>

      window.CONFIG = {

    <script src="script.js"></script>
</body>
</html>
